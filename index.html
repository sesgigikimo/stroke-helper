<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小學日記筆順輔助工具</title>
    <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.7.3/dist/hanzi-writer.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pinyin-pro@3.28.0/dist/index.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Microsoft JhengHei', 'PingFang TC', sans-serif;
            background: #f0f2f5;
            color: #333;
            min-height: 100vh;
        }

        /* Header */
        .header {
            background: #4A90E2;
            color: white;
            padding: 14px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            position: relative;
        }
        .header .back-btn {
            position: absolute;
            left: 16px;
            background: none;
            border: none;
            color: white;
            font-size: 16px;
            cursor: pointer;
            display: none;
        }

        /* Input Area */
        #input-area {
            padding: 30px 20px;
            text-align: center;
        }
        #input-area h3 {
            margin-bottom: 16px;
            font-size: 18px;
            color: #555;
        }
        .input-row {
            display: flex;
            justify-content: center;
            gap: 10px;
            max-width: 600px;
            margin: 0 auto;
        }
        .input-row input {
            flex: 1;
            padding: 12px 16px;
            font-size: 18px;
            border: 2px solid #ddd;
            border-radius: 8px;
            outline: none;
            transition: border-color 0.2s;
        }
        .input-row input:focus { border-color: #4A90E2; }
        .input-row button {
            padding: 12px 24px;
            font-size: 16px;
            background: #4A90E2;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            white-space: nowrap;
        }
        .input-row button:hover { background: #357ABD; }

        /* Character Bar */
        .char-bar {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 4px;
            padding: 12px 20px;
            background: white;
            border-bottom: 1px solid #e0e0e0;
        }
        .char-bar .char-item {
            width: 44px;
            height: 54px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.15s;
            font-size: 22px;
            position: relative;
        }
        .char-bar .char-item:hover { background: #f0f0f0; }
        .char-bar .char-item.active {
            background: #4A90E2;
            color: white;
        }
        .char-bar .char-pinyin {
            font-size: 10px;
            color: #999;
            line-height: 1;
            margin-bottom: 2px;
        }
        .char-bar .char-item.active .char-pinyin { color: rgba(255,255,255,0.8); }

        /* Main Content */
        #display-container { display: none; }
        .main-content {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            padding: 20px;
            max-width: 900px;
            margin: 0 auto;
        }
        .top-row {
            display: flex;
            gap: 20px;
            width: 100%;
        }
        .bottom-row {
            width: 100%;
        }

        /* Left: Grid + Animation */
        .left-panel {
            flex: 0 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .grid-wrapper {
            position: relative;
            width: 300px;
            height: 300px;
            background: white;
            border: 3px solid #333;
            border-radius: 4px;
        }
        .grid-wrapper svg.grid-bg {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
        }
        #writer-target {
            position: relative;
            width: 100%;
            height: 100%;
        }

        /* Controls under grid */
        .grid-controls {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 14px;
            width: 300px;
        }
        .nav-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid #ddd;
            background: white;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
        }
        .nav-btn:hover { border-color: #4A90E2; color: #4A90E2; }
        .nav-btn:disabled { opacity: 0.3; cursor: default; }
        .action-buttons {
            display: flex;
            gap: 8px;
            flex: 1;
            justify-content: center;
        }
        .action-btn {
            padding: 8px 14px;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            color: white;
            transition: opacity 0.15s;
        }
        .action-btn:hover { opacity: 0.85; }
        .btn-animate { background: #4A90E2; }
        .btn-quiz { background: #50C878; }
        .btn-reset { background: #999; }

        /* Speed control */
        .speed-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
            width: 300px;
            font-size: 13px;
            color: #777;
        }
        .speed-row input[type=range] {
            flex: 1;
            accent-color: #4A90E2;
        }

        /* Right: Info Panel */
        .right-panel {
            flex: 1;
            background: white;
            border-radius: 10px;
            padding: 20px;
            min-width: 0;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
        }
        .info-header {
            display: flex;
            align-items: baseline;
            gap: 12px;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid #eee;
        }
        .info-char {
            font-size: 48px;
            font-weight: bold;
            line-height: 1;
        }
        .info-pinyin {
            font-size: 22px;
            color: #4A90E2;
        }
        .info-bopomofo {
            font-size: 16px;
            color: #888;
        }
        .info-meta {
            display: flex;
            gap: 16px;
            margin-bottom: 16px;
            font-size: 14px;
            color: #666;
        }
        .info-meta span {
            background: #f5f5f5;
            padding: 4px 10px;
            border-radius: 4px;
        }
        .info-defs {
            font-size: 15px;
            line-height: 1.8;
            color: #444;
        }
        .info-defs .def-item {
            margin-bottom: 8px;
            padding-left: 8px;
            border-left: 3px solid #4A90E2;
        }
        .info-defs .def-type {
            color: #4A90E2;
            font-weight: bold;
            margin-right: 6px;
        }
        .info-loading {
            color: #aaa;
            font-size: 14px;
        }

        /* Stroke breakdown - vertical strip */
        .stroke-breakdown {
            flex: 0 0 70px;
            background: white;
            border-radius: 10px;
            padding: 8px 5px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            overflow-y: auto;
            max-height: 420px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
        }
        .stroke-breakdown h4 {
            font-size: 11px;
            color: #666;
            margin-bottom: 2px;
            white-space: nowrap;
        }
        .stroke-steps {
            display: flex;
            flex-direction: column;
            gap: 4px;
            align-items: center;
        }
        .stroke-step {
            width: 56px;
            height: 56px;
            border-radius: 4px;
            background: #f5f5f5;
            position: relative;
        }
        .stroke-step .step-num {
            position: absolute;
            top: 1px;
            left: 3px;
            font-size: 9px;
            color: #aaa;
        }

        /* Quiz feedback */
        .quiz-feedback {
            margin-top: 10px;
            font-size: 14px;
            min-height: 22px;
            color: #666;
        }
        .quiz-feedback.correct { color: #50C878; }
        .quiz-feedback.mistake { color: #E74C3C; }

        /* Responsive - tablet */
        @media (max-width: 700px) {
            .main-content {
                flex-direction: column;
                align-items: center;
            }
            .right-panel { width: 100%; }
            .grid-wrapper { width: 260px; height: 260px; }
            .grid-controls, .speed-row { width: 260px; }
        }

        /* Responsive - phone portrait */
        @media (max-width: 500px) {
            .top-row {
                flex-direction: column;
                align-items: center;
                gap: 12px;
            }
            .left-panel { width: 100%; align-items: center; }
            .grid-wrapper {
                width: 260px;
                height: 260px;
            }
            .grid-controls, .speed-row {
                width: 260px;
            }
            .stroke-breakdown {
                flex: none;
                width: 100%;
                max-height: none;
                flex-direction: row;
                border-radius: 10px;
                padding: 8px;
                overflow-x: auto;
                overflow-y: hidden;
            }
            .stroke-breakdown h4 {
                writing-mode: horizontal-tb;
                margin-right: 6px;
                margin-bottom: 0;
            }
            .stroke-steps {
                flex-direction: row;
                gap: 4px;
            }
            .stroke-step {
                width: 46px;
                height: 46px;
                flex-shrink: 0;
            }
            .char-bar {
                gap: 2px;
                padding: 8px 10px;
            }
            .char-bar .char-item {
                width: 36px;
                height: 46px;
                font-size: 18px;
            }
            .input-row input { font-size: 16px; }
        }
    </style>
</head>
<body>

    <div class="header">
        <button class="back-btn" id="backBtn" onclick="goBack()">&lt; 返回</button>
        中文筆順
    </div>

    <div id="input-area">
        <h3>輸入一句話，開始練習每個字的筆順</h3>
        <div class="input-row">
            <input type="text" id="userInput" placeholder="例：到圓山大飯店吃午餐" autofocus>
            <button onclick="startExercise()">開始練習</button>
        </div>
    </div>

    <div id="display-container">
        <!-- Character Bar -->
        <div class="char-bar" id="charBar"></div>

        <div class="main-content">
            <!-- Top row: Grid + Stroke breakdown -->
            <div class="top-row">
                <div class="left-panel">
                    <div class="grid-wrapper">
                        <svg class="grid-bg" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
                            <line x1="150" y1="0" x2="150" y2="300" stroke="#E88" stroke-width="1" stroke-dasharray="6,4"/>
                            <line x1="0" y1="150" x2="300" y2="150" stroke="#E88" stroke-width="1" stroke-dasharray="6,4"/>
                            <line x1="0" y1="0" x2="300" y2="300" stroke="#E88" stroke-width="1" stroke-dasharray="6,4"/>
                            <line x1="300" y1="0" x2="0" y2="300" stroke="#E88" stroke-width="1" stroke-dasharray="6,4"/>
                        </svg>
                        <div id="writer-target"></div>
                    </div>

                    <div class="grid-controls">
                        <button class="nav-btn" id="prevBtn" onclick="prevChar()">&#9664;</button>
                        <div class="action-buttons">
                            <button class="action-btn btn-animate" onclick="playAnimation()">播放</button>
                            <button class="action-btn btn-quiz" onclick="startQuiz()">測驗</button>
                            <button class="action-btn btn-reset" onclick="resetChar()">重置</button>
                        </div>
                        <button class="nav-btn" id="nextBtn" onclick="nextChar()">&#9654;</button>
                    </div>

                    <div class="speed-row">
                        <span>速度</span>
                        <input type="range" id="speedSlider" min="0.3" max="3" step="0.1" value="1">
                        <span id="speedLabel">1.0x</span>
                    </div>

                    <div class="quiz-feedback" id="quizFeedback"></div>
                </div>

                <div class="stroke-breakdown">
                    <h4>筆順</h4>
                    <div class="stroke-steps" id="strokeSteps"></div>
                </div>
            </div>

            <!-- Bottom row: Info panel -->
            <div class="bottom-row">
                <div class="right-panel">
                    <div class="info-header">
                        <span class="info-char" id="infoChar"></span>
                        <span class="info-pinyin" id="infoPinyin"></span>
                        <span class="info-bopomofo" id="infoBopomofo"></span>
                    </div>
                    <div class="info-meta" id="infoMeta"></div>
                    <div class="info-defs" id="infoDefs">
                        <span class="info-loading">載入中...</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let charList = [];
        let currentIndex = 0;
        let writer = null;
        let isQuizMode = false;
        let dictCache = {};

        // Enter key to start
        document.getElementById('userInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') startExercise();
        });

        // Speed slider
        document.getElementById('speedSlider').addEventListener('input', function() {
            document.getElementById('speedLabel').textContent = parseFloat(this.value).toFixed(1) + 'x';
        });

        function startExercise() {
            const input = document.getElementById('userInput').value.trim();
            charList = input.split('').filter(ch => /[\u4e00-\u9fa5]/.test(ch));
            // Deduplicate while preserving order
            charList = [...new Set(charList)];

            if (charList.length === 0) return;

            currentIndex = 0;
            document.getElementById('input-area').style.display = 'none';
            document.getElementById('display-container').style.display = 'block';
            document.getElementById('backBtn').style.display = 'block';

            buildCharBar();
            updateDisplay();
        }

        function goBack() {
            document.getElementById('input-area').style.display = 'block';
            document.getElementById('display-container').style.display = 'none';
            document.getElementById('backBtn').style.display = 'none';
            if (writer) { writer = null; }
            document.getElementById('writer-target').innerHTML = '';
        }

        function buildCharBar() {
            const bar = document.getElementById('charBar');
            bar.innerHTML = '';
            charList.forEach((ch, i) => {
                const div = document.createElement('div');
                div.className = 'char-item' + (i === currentIndex ? ' active' : '');
                const py = typeof pinyinPro !== 'undefined' ? pinyinPro.pinyin(ch) : '';
                div.innerHTML = `<span class="char-pinyin">${py}</span>${ch}`;
                div.onclick = () => { currentIndex = i; updateDisplay(); };
                bar.appendChild(div);
            });
        }

        function updateCharBar() {
            const items = document.querySelectorAll('.char-bar .char-item');
            items.forEach((el, i) => {
                el.classList.toggle('active', i === currentIndex);
            });
        }

        function updateDisplay() {
            const char = charList[currentIndex];
            isQuizMode = false;
            document.getElementById('quizFeedback').textContent = '';

            updateCharBar();
            updateNavButtons();
            createWriter(char);
            updateInfo(char);
        }

        function updateNavButtons() {
            document.getElementById('prevBtn').disabled = currentIndex === 0;
            document.getElementById('nextBtn').disabled = currentIndex === charList.length - 1;
        }

        function createWriter(char) {
            const target = document.getElementById('writer-target');
            target.innerHTML = '';

            const speed = parseFloat(document.getElementById('speedSlider').value);
            writer = HanziWriter.create(target, char, {
                width: 300,
                height: 300,
                padding: 20,
                strokeColor: '#333',
                outlineColor: '#DDD',
                radicalColor: '#4A90E2',
                showOutline: true,
                showCharacter: false,
                strokeAnimationSpeed: speed,
                delayBetweenStrokes: 300,
                drawingWidth: 20,
            });

            // Auto-play animation on load
            writer.animateCharacter();
        }

        function playAnimation() {
            if (!writer) return;
            isQuizMode = false;
            document.getElementById('quizFeedback').textContent = '';
            writer.showOutline();
            writer.hideCharacter();
            const speed = parseFloat(document.getElementById('speedSlider').value);
            writer._options.strokeAnimationSpeed = speed;
            writer.animateCharacter();
        }

        function startQuiz() {
            if (!writer) return;
            isQuizMode = true;
            const fb = document.getElementById('quizFeedback');
            fb.textContent = '請用滑鼠或手指寫出筆順';
            fb.className = 'quiz-feedback';

            writer.quiz({
                showHintAfterMisses: 3,
                highlightOnComplete: true,
                leniency: 1.2,
                onMistake: function(data) {
                    fb.textContent = `筆順不對，再試試！（第 ${data.strokeNum + 1} 筆，已錯 ${data.mistakesOnStroke} 次）`;
                    fb.className = 'quiz-feedback mistake';
                },
                onCorrectStroke: function(data) {
                    fb.textContent = `正確！還剩 ${data.strokesRemaining} 筆`;
                    fb.className = 'quiz-feedback correct';
                },
                onComplete: function(data) {
                    if (data.totalMistakes === 0) {
                        fb.textContent = '太棒了！全部正確！';
                    } else {
                        fb.textContent = `完成！共錯 ${data.totalMistakes} 次`;
                    }
                    fb.className = 'quiz-feedback correct';
                }
            });
        }

        function resetChar() {
            if (!writer) return;
            isQuizMode = false;
            document.getElementById('quizFeedback').textContent = '';
            const char = charList[currentIndex];
            createWriter(char);
        }

        function nextChar() {
            if (currentIndex < charList.length - 1) {
                currentIndex++;
                updateDisplay();
            }
        }

        function prevChar() {
            if (currentIndex > 0) {
                currentIndex--;
                updateDisplay();
            }
        }

        // Dictionary info from Moedict
        async function updateInfo(char) {
            const infoChar = document.getElementById('infoChar');
            const infoPinyin = document.getElementById('infoPinyin');
            const infoBopomofo = document.getElementById('infoBopomofo');
            const infoMeta = document.getElementById('infoMeta');
            const infoDefs = document.getElementById('infoDefs');
            // Immediate pinyin from pinyin-pro
            infoChar.textContent = char;
            const py = typeof pinyinPro !== 'undefined' ? pinyinPro.pinyin(char) : '';
            infoPinyin.textContent = py;
            infoBopomofo.textContent = '';
            infoMeta.innerHTML = '';
            infoDefs.innerHTML = '<span class="info-loading">載入字義中...</span>';

            // Stroke data from HanziWriter
            let strokeCount = 0;
            try {
                const hwData = await HanziWriter.loadCharacterData(char);
                strokeCount = hwData.strokes.length;
                infoMeta.innerHTML += `<span>筆劃：${strokeCount}</span>`;
                renderStrokeBreakdown(char, strokeCount);
            } catch(e) {
                document.getElementById('strokeSteps').innerHTML = '';
            }

            // Moedict API
            if (dictCache[char]) {
                renderDict(char, dictCache[char]);
                return;
            }

            try {
                const res = await fetch(`https://www.moedict.tw/a/${encodeURIComponent(char)}.json`);
                if (!res.ok) throw new Error('not found');
                const data = await res.json();
                dictCache[char] = data;
                renderDict(char, data);
            } catch(e) {
                infoDefs.innerHTML = '<span class="info-loading">查無字義資料</span>';
            }
        }

        function cleanMoedict(s) {
            return s ? s.replace(/`|~/g, '').replace(/\{[^}]*\}/g, '').trim() : '';
        }

        function renderDict(char, data) {
            const infoBopomofo = document.getElementById('infoBopomofo');
            const infoMeta = document.getElementById('infoMeta');
            const infoDefs = document.getElementById('infoDefs');

            // Bopomofo
            if (data.h && data.h[0] && data.h[0].b) {
                infoBopomofo.textContent = data.h[0].b;
            }

            // Radical + stroke info (format: 部首 +外筆劃=總筆劃)
            if (data.r) {
                const radical = cleanMoedict(data.r);
                const totalStrokes = data.c || '';
                const outerStrokes = data.n !== undefined ? data.n : '';
                // Replace existing meta with combined format
                const existingSpans = infoMeta.querySelectorAll('span');
                const hasStrokeSpan = Array.from(existingSpans).some(s => s.textContent.includes('筆劃'));
                if (hasStrokeSpan) {
                    // Remove the HanziWriter stroke span, we'll combine it
                    infoMeta.innerHTML = '';
                }
                infoMeta.innerHTML += `<span>${radical} +${outerStrokes}=${totalStrokes}</span>`;
                if (data.h && data.h[0] && data.h[0].b) {
                    infoMeta.innerHTML += `<span>${data.h[0].b}</span>`;
                }
            }

            // Definitions
            let defsHtml = '';
            if (data.h) {
                data.h.forEach(reading => {
                    if (reading.d) {
                        reading.d.forEach(def => {
                            const type = def.type ? `<span class="def-type">${cleanMoedict(def.type)}</span>` : '';
                            const text = cleanMoedict(def.f);
                            if (text) {
                                defsHtml += `<div class="def-item">${type}${text}</div>`;
                            }
                        });
                    }
                });
            }
            infoDefs.innerHTML = defsHtml || '<span class="info-loading">無釋義</span>';

        }

        async function renderStrokeBreakdown(char, strokeCount) {
            const container = document.getElementById('strokeSteps');
            container.innerHTML = '';

            try {
                const charData = await HanziWriter.loadCharacterData(char);
                const strokes = charData.strokes; // SVG path strings

                for (let i = 0; i < strokeCount; i++) {
                    const step = document.createElement('div');
                    step.className = 'stroke-step';

                    // Build SVG with strokes 0..i
                    let paths = '';
                    for (let s = 0; s <= i; s++) {
                        const color = s === i ? '#4A90E2' : '#333';
                        paths += `<path d="${strokes[s]}" fill="${color}"/>`;
                    }

                    step.innerHTML = `
                        <span class="step-num">${i + 1}</span>
                        <svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg"
                             style="width:100%;height:100%;">
                            <g transform="scale(1,-1) translate(0,-900)">
                                ${paths}
                            </g>
                        </svg>`;
                    container.appendChild(step);
                }
            } catch(e) {
                container.innerHTML = '<span style="color:#aaa;font-size:12px;">無法載入筆順資料</span>';
            }
        }
    </script>
</body>
</html>
